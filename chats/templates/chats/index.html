{% extends "shared/layout.html" %} {% block content %}

<h1>WebSocket Chat</h1>

<!-- 消息顯示區域 -->
<div id="chat-log">
  <p>Messages will appear here...</p>
</div>

<!-- 消息輸入與控制區域 -->
<div id="chat-controls">
  <!-- 目標用戶 ID 輸入框 -->
  <input type="text" id="target-user-id" placeholder="Enter target user ID" />

  <!-- 聊天消息輸入框 -->
  <input
    type="text"
    id="chat-message-input"
    placeholder="Type your message here"
  />

  <!-- 發送消息按鈕 -->
  <button id="chat-message-submit">Send Message</button>
</div>

<script>
    const chatSocket = new WebSocket(
        'ws://' + window.location.host + '/ws/chat/' + userId + '/'
    )

    chatSocket.onopen = function(e) {
        console.log("WebSocket connection established")
    }

    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        console.log("Message received", data.message)
    }

    document.querySelector("#chat-message-submit").onclick = function(e){
        const targetUserId = document.querySelector("#target-user-id").value;
        const message = document.querySelector("#chat-message-input").value;

        chatSocket.send(JSON.stringify({
            'target_user_id': targetUserId,
            "message": message
        }))
    }

</script>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #chat-log {
    width: 80%;
    height: 300px;
    border: 1px solid #ccc;
    margin: 20px 0;
    overflow-y: auto;
    padding: 10px;
  }

  #chat-controls {
    width: 80%;
    display: flex;
    flex-direction: column;
  }

  #chat-controls input {
    margin-bottom: 10px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
  }

  #chat-message-submit {
    padding: 10px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  #chat-message-submit:hover {
    background-color: #0056b3;
  }
</style>

{% endblock %}
